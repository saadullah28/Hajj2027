<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">

<body class="landing-page">

    <div class="islamic-pattern"></div>
    <div class="floating-orb floating-orb-1"></div>
    <div class="floating-orb floating-orb-2"></div>
    <div class="landing-artwork landing-artwork-left" aria-hidden="true">
        <img
            src="makkah.png"
            alt="Khanna kabba"
        >
    </div>
    <div class="landing-artwork landing-artwork-right" aria-hidden="true">
        <img
            src="medina.png"
            alt="masjid nabwi"
        >
    </div>

    <main class="landing-hero">
        <h1 class="company-title mb-4">Al-Mashood Munazzam PVT Ltd</h1>

        <div class="logo-wrapper">
            <div class="logo-glow"></div>
            <div class="glass-panel d-flex align-items-center justify-content-center">

                    src="company.jpeg"
                    alt="Al-Haram Journey Logo"
                    class="logo-img"
                >
            </div>
            <div class="frame-tl"></div>
            <div class="frame-br"></div>
        </div>

        <div class="decorative-divider">
            <div class="line"></div>
            <div class="diamond"></div>
            <div class="line"></div>
        </div>

        <div class="pt-3 d-flex flex-wrap justify-content-center gap-3">
            <a href="partner_directory.html" class="btn-gold">
                Next
                <span class="material-symbols-outlined">arrow_forward</span>
            </a>
            <a href="registration_form.html" class="btn-gold">
                Group Creation
                <span class="material-symbols-outlined">group_add</span>
            </a>
        </div>
    </main>

    <footer class="landing-footer">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-start mb-3 mb-md-0">
                    <small class="text-muted-custom opacity-75">
                        &copy; 2024 Al-Haram Journey. Blessed travels with excellence and devotion.
                    </small>
                </div>
                <div class="col-md-6 text-center text-md-end">
                    <a href="#" class="me-4">Privacy Policy</a>
                    <a href="#">Terms of Service</a>
                </div>
            </div>
        </div>
